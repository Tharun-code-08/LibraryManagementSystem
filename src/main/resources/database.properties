# MySQL / HikariCP / Hibernate configuration.
# Override any of these via an external database.properties on the classpath, or via
# environment variables of the same name (uppercased, dots -> underscores) if wired up
# by the deployment script. Do NOT commit real production credentials here.
#
# db.password has no default on purpose: DatabaseConfig fails fast at startup
# (IllegalStateException) if it is left blank, rather than silently connecting with a
# well-known placeholder credential. Set it via an external database.properties or an
# environment override before running the app.

db.jdbc-url=jdbc:mysql://localhost:3306/library_management?useSSL=true&serverTimezone=UTC
db.username=lms_app
db.password=
db.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP pool sizing
db.pool.name=LMS-HikariPool
db.pool.maximum-pool-size=20
db.pool.minimum-idle=5
db.pool.connection-timeout-ms=30000
db.pool.idle-timeout-ms=600000
db.pool.max-lifetime-ms=1800000

# Hibernate
hibernate.hbm2ddl.auto=validate
hibernate.show_sql=false
hibernate.format_sql=true
hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Flyway
flyway.locations=classpath:db/migration
flyway.baseline-on-migrate=true
