# Application-level configuration (non-secret). Environment/branch-specific overrides may
# live in an external application.properties placed next to the packaged jar.

app.name=Library Management System
app.version=0.1.0
app.theme.default=light
app.session.idle-timeout-minutes=15
app.pagination.default-page-size=25
app.locale.default=en_US

# Business rule defaults (overridable per membership_type row once persisted)
app.circulation.default-loan-period-days=14
app.circulation.default-fine-per-day=5.00
app.circulation.reservation-hold-days=3

app.backup.directory=./backups
app.backup.auto-enabled=true
app.backup.schedule-cron=0 0 2 * * ?

# Generated catalog assets: book QR codes and book-copy barcode labels.
app.assets.qrcodes-directory=./generated/qrcodes
app.assets.barcodes-directory=./generated/barcodes
app.catalog.default-branch-code=MAIN

# People / Membership
app.membership.default-validity-days=365
app.assets.photos-directory=./generated/photos

# Fines / Payments
app.assets.receipts-directory=./generated/receipts

# Reports
app.assets.reports-directory=./generated/reports

# Notifications
app.smtp.host=localhost
app.smtp.port=587
app.smtp.username=
app.smtp.password=
app.smtp.from-address=library@university.edu
app.smtp.auth-enabled=false
app.smtp.starttls-enabled=true
app.notifications.overdue-sweep-interval-hours=24
