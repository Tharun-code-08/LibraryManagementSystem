name: Release Installers

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            jpackage-type: APP_IMAGE
          - os: macos-latest
            jpackage-type: DMG
          - os: ubuntu-latest
            jpackage-type: DEB

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # Liberica JDK Full bundles JavaFX modules so jlink can include them in the
      # app's runtime image. Temurin has no JavaFX — the app silently crashes on launch.
      - name: Set up Liberica JDK 21 Full (includes JavaFX)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'liberica'
          java-package: 'jdk+fx'

      - name: Build installer
        shell: bash
        run: mvn -Ppackage-installer clean package -Djpackage.type=${{ matrix.jpackage-type }} -DskipTests

      # APP_IMAGE produces a folder; zip it for a clean "extract-and-run" download
      - name: Package Windows portable ZIP
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd target/dist
          7z a LibraryManagementSystem-Windows.zip LibraryManagementSystem/
          ls -lh LibraryManagementSystem-Windows.zip

      - name: Rename macOS artifact
        if: runner.os == 'macOS'
        shell: bash
        run: |
          src=$(ls target/dist/*.dmg | head -1)
          cp "$src" target/dist/LibraryManagementSystem.dmg

      - name: Rename Linux artifact
        if: runner.os == 'Linux'
        shell: bash
        run: |
          src=$(ls target/dist/*.deb | head -1)
          cp "$src" target/dist/LibraryManagementSystem.deb

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/dist/LibraryManagementSystem-Windows.zip
            target/dist/LibraryManagementSystem.dmg
            target/dist/LibraryManagementSystem.deb
          fail_on_unmatched_files: false
