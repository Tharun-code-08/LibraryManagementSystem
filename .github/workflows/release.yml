name: Release Installers

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            jpackage-type: EXE
          - os: macos-latest
            jpackage-type: DMG
          - os: ubuntu-latest
            jpackage-type: DEB

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Add WiX Toolset to PATH (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: echo "C:\\Program Files (x86)\\WiX Toolset v3.11\\bin" >> $GITHUB_PATH

      - name: Build installer
        shell: bash
        run: mvn -Ppackage-installer clean package -Djpackage.type=${{ matrix.jpackage-type }} -DskipTests

      - name: Rename Windows artifact
        if: runner.os == 'Windows'
        shell: bash
        run: |
          src=$(ls target/dist/*.exe | head -1)
          cp "$src" target/dist/LibraryManagementSystem-Setup.exe

      - name: Rename macOS artifact
        if: runner.os == 'macOS'
        shell: bash
        run: |
          src=$(ls target/dist/*.dmg | head -1)
          cp "$src" target/dist/LibraryManagementSystem.dmg

      - name: Rename Linux artifact
        if: runner.os == 'Linux'
        shell: bash
        run: |
          src=$(ls target/dist/*.deb | head -1)
          cp "$src" target/dist/LibraryManagementSystem.deb

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/dist/LibraryManagementSystem-Setup.exe
            target/dist/LibraryManagementSystem.dmg
            target/dist/LibraryManagementSystem.deb
          fail_on_unmatched_files: false
